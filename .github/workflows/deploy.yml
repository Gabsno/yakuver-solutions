name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Only one concurrent deploy — newer commits cancel queued runs
concurrency:
  group: pages
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Build (Astro)
        run: npm run build
        env:
          # Flip to '1' once a custom domain (CNAME) is configured in repo Settings → Pages
          CUSTOM_DOMAIN: '0'

      - name: Add .nojekyll
        # Prevents GitHub Pages from running the output through Jekyll
        # (which mangles _underscore-prefixed asset names produced by the bundler)
        run: touch dist/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
